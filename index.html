<style>
  :root {

    --rosa-dark:#9d174d;--rosa-med:#db2777;
    --rosa-row1:#fff0f7;--rosa-row2:#fce7f3;
    --amarillo:#fef08a;--amarillo-dark:#ca8a04;
    --header-bg:#0f2847;--text:#1e293b;--text-light:#64748b;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f1f5f9;color:var(--text);min-height:100vh;padding-bottom:90px}
  .app-header{background:var(--header-bg);color:white;padding:16px 16px 12px;position:sticky;top:0;z-index:100;box-shadow:0 2px 16px rgba(0,0,0,.25)}
  .header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
  .app-title{font-size:18px;font-weight:700}
  .app-subtitle{font-size:11px;opacity:.6;margin-top:1px}
  .save-indicator{font-size:10px;background:rgba(34,197,94,.2);color:#86efac;padding:4px 10px;border-radius:20px;font-weight:600}
  .mode-toggle{display:flex;background:rgba(255,255,255,.1);border-radius:10px;padding:3px;gap:2px}
  .mode-btn{flex:1;padding:7px 12px;border:none;border-radius:8px;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;background:transparent;color:rgba(255,255,255,.6)}
  .mode-btn.active{background:white;color:var(--azul-dark);box-shadow:0 1px 6px rgba(0,0,0,.2)}
  .search-bar{margin:12px 0 0;position:relative}
  .search-bar input{width:100%;padding:10px 16px 10px 38px;border-radius:10px;border:none;background:rgba(255,255,255,.12);color:white;font-family:inherit;font-size:14px;outline:none}
  .search-bar input::placeholder{color:rgba(255,255,255,.45)}
  .search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);opacity:.5;font-size:15px}
  .stats-bar{display:flex;gap:8px;padding:10px 16px;overflow-x:auto;scrollbar-width:none}
  .stats-bar::-webkit-scrollbar{display:none}
  .stat-chip{flex-shrink:0;padding:5px 12px;border-radius:20px;font-size:12px;font-weight:600;white-space:nowrap}
  .stat-chip.total{background:#e2e8f0;color:#334155}
  .stat-chip.solidos{background:var(--azul-light);color:var(--azul-dark)}
  .stat-chip.liquidos{background:var(--rosa-row2);color:var(--rosa-dark)}
  .content{padding:0 16px}
  .read-banner{display:none;background:#fef9c3;border:1px solid #fde047;border-radius:10px;padding:8px 14px;font-size:12px;color:#713f12;margin:8px 16px 0;text-align:center;font-weight:500}
  body.read-mode .read-banner{display:block}
  .cat-header{display:flex;align-items:center;gap:10px;padding:10px 16px;border-radius:10px;margin:16px 0 6px;font-size:14px;font-weight:700}
  .cat-header.solidos{background:var(--azul-dark);color:white}
  .cat-header.liquidos{background:var(--rosa-dark);color:white}
  .cat-count{margin-left:auto;background:rgba(255,255,255,.2);padding:2px 8px;border-radius:10px;font-size:11px}
  .table-head{display:grid;grid-template-columns:82px 1fr 72px 72px 52px 48px;gap:4px;padding:6px 8px;background:var(--header-bg);border-radius:8px;margin-bottom:3px}
  .th{font-size:9px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:rgba(255,255,255,.7);text-align:center}
  .th:nth-child(2){text-align:left}
  .product-row{display:grid;grid-template-columns:82px 1fr 72px 72px 52px 48px;gap:4px;padding:9px 8px;border-radius:8px;margin-bottom:3px;cursor:pointer;transition:all .15s ease;border:2px solid transparent}
  .product-row.solido-odd{background:var(--azul-row1)}
  .product-row.solido-even{background:var(--azul-row2)}
  .product-row.liquido-odd{background:var(--rosa-row1)}
  .product-row.liquido-even{background:var(--rosa-row2)}
  body.read-mode .product-row.selected{background:var(--amarillo)!important;border-color:var(--amarillo-dark);box-shadow:0 2px 10px rgba(202,138,4,.25)}
  .cell{font-size:11px;color:var(--text);text-align:center;display:flex;align-items:center;justify-content:center;word-break:break-word}
  .cell.name{text-align:left;justify-content:flex-start;font-size:12px;font-weight:500;line-height:1.3}
  .cell.code{font-family:inherit;font-size:12px;font-weight:500;color:var(--text)}
  
  .tamper-badge{display:inline-flex;align-items:center;justify-content:center;padding:2px 7px;border-radius:10px;font-size:10px;font-weight:700}
  .tamper-si{background:#dcfce7;color:#166534}
  .tamper-no{background:#fee2e2;color:#991b1b}
  .tamper-empty{background:#f1f5f9;color:#94a3b8;font-size:9px}
  .edit-overlay{display:none;position:fixed;inset:0;background:rgba(15,40,71,.7);z-index:200;backdrop-filter:blur(4px);align-items:flex-end}
  .edit-overlay.visible{display:flex}
  .edit-sheet{background:white;border-radius:20px 20px 0 0;padding:20px 20px 40px;width:100%;max-height:88vh;overflow-y:auto;animation:slideUp .25s ease}
  @keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
  .edit-handle{width:36px;height:4px;background:#e2e8f0;border-radius:2px;margin:0 auto 18px}
  .edit-title{font-size:16px;font-weight:700;color:var(--azul-dark);margin-bottom:16px}
  .edit-field{margin-bottom:14px}
  .edit-label{font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--text-light);margin-bottom:5px}
  .edit-input,.edit-select{width:100%;padding:11px 14px;border:2px solid #e2e8f0;border-radius:10px;font-family:inherit;font-size:14px;outline:none;background:white;transition:border-color .2s;appearance:none}
  .edit-input:focus,.edit-select:focus{border-color:var(--azul-med)}
  .edit-actions{display:flex;gap:10px;margin-top:20px}
  .btn-save{flex:1;padding:14px;background:var(--azul-dark);color:white;border:none;border-radius:12px;font-family:inherit;font-size:15px;font-weight:700;cursor:pointer}
  .btn-cancel{padding:14px 20px;background:#f1f5f9;color:var(--text);border:none;border-radius:12px;font-family:inherit;font-size:15px;font-weight:600;cursor:pointer}
  .btn-delete{padding:14px 16px;background:#fee2e2;color:#991b1b;border:none;border-radius:12px;font-size:18px;cursor:pointer}
  .fab{position:fixed;bottom:24px;right:20px;width:58px;height:58px;border-radius:50%;background:var(--azul-dark);color:white;font-size:30px;border:none;box-shadow:0 4px 20px rgba(15,40,71,.4);cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:150;transition:transform .2s}
  .fab:active{transform:scale(.92)}
  body.read-mode .fab{display:none}
  .no-results{text-align:center;padding:40px 20px;color:var(--text-light);font-size:14px}
</style>

    <div class="edit-actions">

    </div>
  </div>
</div>

];

let products=[],editingId=null,selectedId=null,currentMode='read';

function loadData(){
  try{const s=localStorage.getItem(STORAGE_KEY);products=s?JSON.parse(s):JSON.parse(JSON.stringify(defaultData));}
  catch(e){products=JSON.parse(JSON.stringify(defaultData));}
}

function saveData(){
  try{
    localStorage.setItem(STORAGE_KEY,JSON.stringify(products));
    const ind=document.getElementById('saveIndicator');
    ind.textContent='✓ Guardado';ind.style.color='#86efac';
  }catch(e){document.getElementById('saveIndicator').textContent='⚠ Error';}
}

function setMode(mode){
  currentMode=mode;
  document.body.classList.toggle('read-mode',mode==='read');
  document.body.classList.toggle('edit-mode',mode==='edit');
  document.getElementById('btnRead').classList.toggle('active',mode==='read');
  document.getElementById('btnEdit').classList.toggle('active',mode==='edit');
  selectedId=null;renderAll();
}

function renderAll(){
  const q=document.getElementById('searchInput').value.toLowerCase().trim();
  const f=products.filter(p=>p.name.toLowerCase().includes(q)||p.code.toLowerCase().includes(q)||(p.prospecto||'').toLowerCase().includes(q)||(p.estuche||'').toLowerCase().includes(q));
  const sol=f.filter(p=>p.cat==='solido').sort((a,b)=>a.name.localeCompare(b.name,'es')),liq=f.filter(p=>p.cat==='liquido').sort((a,b)=>a.name.localeCompare(b.name,'es'));
  document.getElementById('statsBar').innerHTML=`<div class="stat-chip total">📦 Total: ${f.length}</div><div class="stat-chip solidos">💊 Sólidos: ${sol.length}</div><div class="stat-chip liquidos">🧴 Líquidos: ${liq.length}</div>`;
  let html='';
  if(!f.length){html='<div class="no-results">No se encontraron productos</div>';}
  else{
    const thead=`<div class="table-head"><div class="th">Código</div><div class="th">Nombre</div><div class="th">Prospecto</div><div class="th">Estuche</div><div class="th">Tamper</div><div class="th">S/N</div></div>`;
    if(sol.length){html+=`<div class="cat-header solidos">💊 SÓLIDOS <span class="cat-count">${sol.length}</span></div>${thead}`;sol.forEach((p,i)=>{html+=renderRow(p,i,'solido');});}
    if(liq.length){html+=`<div class="cat-header liquidos">🧴 LÍQUIDOS <span class="cat-count">${liq.length}</span></div>${thead}`;liq.forEach((p,i)=>{html+=renderRow(p,i,'liquido');});}
  }
  document.getElementById('mainContent').innerHTML=html;
}

function renderRow(p,i,cat){
  const sel=selectedId===p.id;
  const bc=cat==='solido'?(i%2===0?'solido-odd':'solido-even'):(i%2===0?'liquido-odd':'liquido-even');
  const sc=sel?' selected':'';
  const oc=currentMode==='read'?`onclick="selectRow(${p.id})"`:`onclick="editProduct(${p.id})"`;
  let tb='<span class="tamper-badge tamper-empty">—</span>';
  if(p.tamper==='Sí')tb='<span class="tamper-badge tamper-si">Sí</span>';
  if(p.tamper==='No')tb='<span class="tamper-badge tamper-no">No</span>';
  let sb='<span class="tamper-badge tamper-empty">—</span>';
  if(p.sn==='Sí')sb='<span class="tamper-badge tamper-si">Sí</span>';
  if(p.sn==='No')sb='<span class="tamper-badge tamper-no">No</span>';
  return `<div class="product-row ${bc}${sc}" ${oc}><div class="cell code">${p.code}</div><div class="cell name">${p.name}</div><div class="cell">${p.prospecto||'<span style="color:#cbd5e1;font-size:10px">—</span>'}</div><div class="cell">${p.estuche||'<span style="color:#cbd5e1;font-size:10px">—</span>'}</div><div class="cell">${tb}</div><div class="cell">${sb}</div></div>`;
}

function selectRow(id){if(currentMode!=='read')return;selectedId=selectedId===id?null:id;renderAll();}

function editProduct(id){
  if(currentMode!=='edit')return;
  const p=products.find(x=>x.id===id);if(!p)return;
  editingId=id;
  document.getElementById('editTitle').textContent='Editar producto';
  document.getElementById('eCode').value=p.code;
  document.getElementById('eName').value=p.name;
  document.getElementById('eCategoria').value=p.cat;
  document.getElementById('eProspecto').value=p.prospecto||'';
  document.getElementById('eEstuche').value=p.estuche||'';
  document.getElementById('eTamper').value=p.tamper||'';
  document.getElementById('eSN').value=p.sn||'';
  document.getElementById('btnDelete').style.display='block';
  document.getElementById('editOverlay').classList.add('visible');
}

function newProduct(){
  editingId=null;
  document.getElementById('editTitle').textContent='Nuevo producto';
  document.getElementById('eCode').value='FAES-'+String(products.length+1).padStart(3,'0');
  document.getElementById('eName').value='';
  document.getElementById('eCategoria').value='solido';
  document.getElementById('eProspecto').value='';
  document.getElementById('eEstuche').value='';
  document.getElementById('eTamper').value='';
  document.getElementById('eSN').value='';
  document.getElementById('btnDelete').style.display='none';
  document.getElementById('editOverlay').classList.add('visible');
}

function saveProduct(){
  const data={code:document.getElementById('eCode').value.trim(),name:document.getElementById('eName').value.trim(),cat:document.getElementById('eCategoria').value,prospecto:document.getElementById('eProspecto').value.trim(),estuche:document.getElementById('eEstuche').value.trim(),tamper:document.getElementById('eTamper').value,sn:document.getElementById('eSN').value};
  if(!data.name){alert('El nombre es obligatorio');return;}
  if(editingId){const idx=products.findIndex(p=>p.id===editingId);if(idx>=0)products[idx]={...products[idx],...data};}
  else{const nid=Math.max(...products.map(p=>p.id),0)+1;products.push({id:nid,...data});}
  saveData();closeEdit();renderAll();
}

function deleteProduct(){
  if(!editingId)return;
  if(!confirm('¿Eliminar este producto?'))return;
  products=products.filter(p=>p.id!==editingId);
  saveData();closeEdit();renderAll();
}

function closeEdit(){document.getElementById('editOverlay').classList.remove('visible');editingId=null;}
document.getElementById('editOverlay').addEventListener('click',function(e){if(e.target===this)closeEdit();});

loadData();renderAll();
</script>
